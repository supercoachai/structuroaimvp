<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Wachtlijst · Structuro</title>
<meta name="description" content="Meld je aan voor Structuro voor de launch. Eén gerichte mail, geen spam."/>
<link rel="icon" href="/uploads/logo-structuro.png" type="image/png"/>
<link rel="apple-touch-icon" href="/uploads/logo-structuro.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
:root {
  --bg:#F4F6FB;--white:#FFF;--border:#E2E8F0;--text:#0F172A;--sub:#64748B;--place:#94A3B8;--blue:#2563EB;--blue-h:#1D4ED8;
  --green:#10B981;--green-s:#ECFDF5;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100dvh;}
a{color:inherit;text-decoration:none;}
.wl-shell{position:relative;isolation:isolate;padding:max(12px,env(safe-area-inset-top)) 20px max(32px,env(safe-area-inset-bottom));}
.wl-shell::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(37,99,235,.14),transparent);z-index:-1;}
.wl-inner{max-width:520px;margin:0 auto;}
.wl-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:8px 0 28px;border-bottom:1px solid var(--border);margin-bottom:28px;}
.wl-brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;color:var(--text);}
.wl-brand img{height:36px;width:auto;display:block;}
.lang-switch{display:flex;gap:2px;padding:4px;background:var(--white);border:1px solid var(--border);border-radius:10px;font-size:12px;font-weight:700;}
.lang-switch button{border:none;background:transparent;padding:8px 12px;border-radius:8px;cursor:pointer;font:inherit;color:var(--sub);}
.lang-switch button.active{background:var(--blue);color:#fff;}
main h1{font-size:clamp(26px,5vw,32px);font-weight:800;letter-spacing:-.03em;line-height:1.12;margin-bottom:10px;}
.wl-lede{color:var(--sub);font-size:16px;font-weight:400;margin-bottom:28px;}
.wl-card{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:26px 24px 28px;box-shadow:0 12px 40px rgba(15,23,42,.06);}
label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:6px;}
input[type=text],input[type=email]{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--border);font:inherit;font-size:16px;margin-bottom:18px;background:#fafbfc;}
input::placeholder{color:var(--place);opacity:1;}
input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.btn-submit{appearance:none;width:100%;border:none;border-radius:12px;background:var(--blue);color:#fff;font:inherit;font-weight:700;font-size:16px;padding:14px 20px;cursor:pointer;box-shadow:0 8px 22px rgba(37,99,235,.28);transition:background .18s;}
.btn-submit:hover{background:var(--blue-h);}
.btn-submit:disabled{opacity:.55;cursor:not-allowed;}
.wl-msg{margin-top:14px;font-size:14px;display:none;padding:14px;border-radius:12px;}
.wl-msg.show{display:block;}
.wl-msg.ok{background:var(--green-s);border:1px solid #A7F3D0;color:#065F46;}
.wl-msg.warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;}
.wl-msg.err{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;}
.wl-back{display:inline-block;margin-top:28px;font-size:14px;font-weight:600;color:var(--blue);}
.wl-back:hover{text-decoration:underline;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="wl-shell">
  <div class="wl-inner">
    <header class="wl-head">
      <a href="/" class="wl-brand">
        <img src="/uploads/logo-structuro.png" alt="Structuro"/>
        <span>Structuro</span>
      </a>
      <div class="lang-switch" role="group" aria-label="Taal">
        <button type="button" id="btnNL" class="active">NL</button>
        <button type="button" id="btnEN">EN</button>
      </div>
    </header>
    <main>
      <h1 data-i18n="wl_h1">Wachtlijst</h1>
      <p class="wl-lede" data-i18n="wl_lede">Laat je gegevens achter. Als Structuro voor jou live gaat, hoor je van ons. Geen nieuwsbrieven, geen gedoe.</p>
      <div class="wl-card" id="wl-card">
        <form id="wl-form">
          <div>
            <label for="wl-name" data-i18n="wl_name">Naam</label>
            <input id="wl-name" name="name" type="text" autocomplete="given-name" required maxlength="120" placeholder="Jouw naam"/>
          </div>
          <div>
            <label for="wl-email" data-i18n="wl_email">E-mailadres</label>
            <input id="wl-email" name="email" type="email" autocomplete="email" required maxlength="254" placeholder="jouw@email.nl"/>
          </div>
          <button type="submit" class="btn-submit" id="wl-submit" data-i18n="wl_submit">Zet me op de lijst</button>
        </form>
        <div id="wl-dup" class="wl-msg warn" hidden role="alert"></div>
        <div id="wl-err" class="wl-msg err" hidden role="alert"></div>
      </div>
      <a href="/" class="wl-back" data-i18n="wl_back">← Terug naar de landingspagina</a>
    </main>
  </div>
</div>

<script src="/js/ph-config.js"></script>
<script defer src="/js/analytics.js"></script>

<script type="module">
  const SUPABASE_URL = 'https://oapnsywlmdmqgmfwiojy.supabase.co';
  const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';

  const T = {
    nl: {
      wl_h1: 'Wachtlijst',
      wl_lede: 'Laat je gegevens achter. Als Structuro voor jou live gaat, hoor je van ons. Geen nieuwsbrieven, geen gedoe.',
      wl_name: 'Naam',
      wl_email: 'E-mailadres',
      wl_ph_name: 'Jouw naam',
      wl_ph_email: 'jouw@email.nl',
      wl_submit: 'Zet me op de lijst',
      wl_success: 'Gelukt! Je hoort van ons zodra Structuro live gaat op 26 mei.',
      wl_dup: 'Dit e-mailadres staat al op de lijst.',
      wl_err: 'Er ging iets mis. Probeer het opnieuw.',
      wl_back: '← Terug naar de landingspagina',
    },
    en: {
      wl_h1: 'Waitlist',
      wl_lede: 'Leave your details. When Structuro is live for you, you will hear from us. No newsletters, no fuss.',
      wl_name: 'Name',
      wl_email: 'Email',
      wl_ph_name: 'Your name',
      wl_ph_email: 'your@email.com',
      wl_submit: 'Join the waitlist',
      wl_success: 'Done! You will hear from us when Structuro goes live on 26 May.',
      wl_dup: 'This email address is already on the list.',
      wl_err: 'Something went wrong. Please try again.',
      wl_back: '← Back to the landing page',
    },
  };

  function supabaseAnonKeyReady() {
    var k = (SUPABASE_ANON_KEY || '').trim();
    if (!k) return false;
    if (k.indexOf('__SUPABASE_ANON_KEY__') !== -1) return false;
    return k.length >= 40;
  }

  function lang() {
    var s = '';
    try { s = localStorage.getItem('structuro_lang') || ''; } catch (e) {}
    return s === 'en' ? 'en' : 'nl';
  }
  function setLang(l) {
    try { localStorage.setItem('structuro_lang', l); } catch (e) {}
    document.documentElement.lang = l === 'en' ? 'en' : 'nl';
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var k = el.getAttribute('data-i18n');
      if (T[l][k]) el.textContent = T[l][k];
    });
    document.getElementById('btnNL').classList.toggle('active', l === 'nl');
    document.getElementById('btnEN').classList.toggle('active', l === 'en');
    document.getElementById('wl-name').placeholder = T[l].wl_ph_name;
    document.getElementById('wl-email').placeholder = T[l].wl_ph_email;
    var okEl = document.getElementById('wl-success-msg');
    if (okEl && okEl.dataset.i18nKey === '1' && T[l].wl_success) okEl.textContent = T[l].wl_success;
  }

  document.getElementById('btnNL').onclick = function () { setLang('nl'); };
  document.getElementById('btnEN').onclick = function () { setLang('en'); };
  setLang(lang());

  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');

  const form = document.getElementById('wl-form');
  const btn = document.getElementById('wl-submit');
  const boxDup = document.getElementById('wl-dup');
  const boxErr = document.getElementById('wl-err');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    boxDup.hidden = true;
    boxErr.hidden = true;
    if (!supabaseAnonKeyReady()) {
      boxErr.textContent = T[lang()].wl_err;
      boxErr.hidden = false;
      return;
    }
    btn.disabled = true;
    const nameVal = document.getElementById('wl-name').value.trim();
    const emailVal = document.getElementById('wl-email').value.trim().toLowerCase();
    try {
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY.trim());
      const { error } = await supabase.from('waitlist_subscribers').insert({
        name: nameVal,
        email: emailVal,
        source: 'eu_wachtlijst',
      });
      if (!error) {
        form.classList.add('hidden');
        var okEl = document.getElementById('wl-success-msg');
        if (!okEl) {
          okEl = document.createElement('p');
          okEl.id = 'wl-success-msg';
          okEl.className = 'wl-msg ok show';
          okEl.setAttribute('role', 'status');
          okEl.dataset.i18nKey = '1';
          document.getElementById('wl-card').appendChild(okEl);
        }
        okEl.textContent = T[lang()].wl_success;
        return;
      }
      var code = error.code || '';
      var msg = (error.message || '') + '';
      if (code === '23505' || /duplicate|unique/i.test(msg)) {
        boxDup.textContent = T[lang()].wl_dup;
        boxDup.hidden = false;
      } else {
        boxErr.textContent = T[lang()].wl_err;
        boxErr.hidden = false;
      }
    } catch (err) {
      boxErr.textContent = T[lang()].wl_err;
      boxErr.hidden = false;
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
