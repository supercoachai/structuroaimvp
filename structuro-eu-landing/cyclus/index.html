<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Cyclus & ADHD · Structuro</title>
<meta name="description" content="Hoe hormonen dopamine, focus en executie beïnvloeden. Structuro past je dag aan op je cyclus."/>
<link rel="icon" href="/uploads/logo-structuro.png" type="image/png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#F0F2F8;--white:#FFF;--border:rgba(26,35,64,0.12);--text:#1A2340;--sub:#6B7280;--place:#ABB3C5;
  --blue:#3B6BF7;--font:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5;-webkit-font-smoothing:antialiased;}
a{color:var(--blue);text-decoration:none;font-weight:600;}
a:hover{text-decoration:underline;}
.container{max-width:1100px;margin:0 auto;padding:0 24px;}
.page-head{padding:28px 0;border-bottom:1px solid var(--border);margin-bottom:48px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.page-head img{height:32px;width:auto;}
.section-eyebrow{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--blue);margin-bottom:12px;}
h1{font-size:clamp(28px,4vw,40px);font-weight:800;letter-spacing:-.03em;line-height:1.12;margin-bottom:14px;}
.lede{font-size:17px;color:var(--sub);max-width:560px;line-height:1.6;}
.voor-vrouwen{padding:0 0 88px;}
.voor-vrouwen-head{text-align:center;margin-bottom:64px;}
.cycle-layout{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start;}
@media(max-width:860px){.cycle-layout{grid-template-columns:1fr;gap:40px;}}
.cycle-svg-wrap{display:flex;justify-content:center;}
.cycle-svg{width:360px;height:360px;max-width:100%;}
@media(max-width:860px){.cycle-svg{width:260px;height:260px;}}
.cycle-info{display:flex;flex-direction:column;gap:10px;}
.cycle-phase-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:14px 18px;cursor:pointer;transition:all 200ms;position:relative;overflow:hidden;}
.cycle-phase-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--phase-color,#3B6BF7);opacity:0;transition:opacity 200ms;}
.cycle-phase-card.active{border-color:var(--phase-color,#3B6BF7);background:var(--phase-light,#DBEAFE);transform:translateX(4px);box-shadow:0 4px 16px rgba(26,35,64,.07);}
.cycle-phase-card.active::before{opacity:1;}
.cycle-phase-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.cycle-phase-dot{width:8px;height:8px;border-radius:50%;background:var(--phase-color,#3B6BF7);flex-shrink:0;}
.cycle-phase-name{font-size:13.5px;font-weight:700;}
.cycle-phase-days{font-size:11px;color:var(--sub);font-weight:500;}
.cycle-phase-sub{font-size:12.5px;color:var(--sub);line-height:1.5;padding-left:16px;}
.cycle-phase-structuro{font-size:11.5px;font-weight:600;color:var(--blue);margin-top:3px;padding-left:16px;}
.cycle-disclaimer{margin-top:32px;font-size:12.5px;color:var(--place);font-style:italic;text-align:center;}
.cycle-info-btn{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--sub);font-size:11px;cursor:pointer;margin-left:auto;display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0;}
.cycle-phase-detail{margin-top:12px;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.cycle-phase-detail[hidden]{display:none;}
.cycle-detail-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.10em;color:var(--phase-color,#3B6BF7);}
.cycle-detail-text{font-size:12.5px;color:var(--sub);line-height:1.6;}
.cycle-detail-disclaimer{font-size:11px;color:var(--place);font-style:italic;margin-top:4px;}
@media(prefers-reduced-motion:reduce){#cycleIndicator>circle:first-child{animation:none!important;}}
</style>
<script src="/js/ph-config.js"></script>
<script src="/js/analytics.js"></script>
</head>
<body>
<div class="container">
  <header class="page-head">
    <a href="/"><img src="/uploads/logo-structuro.png" alt="Structuro"/></a>
    <a href="/">← Terug naar landingspagina</a>
  </header>
  <section class="voor-vrouwen" id="voor-vrouwen">
    <div class="voor-vrouwen-head">
      <div class="section-eyebrow">Voor vrouwen</div>
      <h1>ADHD werkt anders bij vrouwen</h1>
      <p class="lede" style="margin:0 auto;">Hormonen sturen dopamine, focus en emotieregulatie, en dus ook hoe ADHD zich elke dag uit. Structuro houdt daar rekening mee.</p>
    </div>
    <div class="cycle-layout">
      <div class="cycle-svg-wrap">
        <svg id="cycleSvg" class="cycle-svg" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg" aria-label="Cyclus-fase visualisatie">
          <defs>
            <radialGradient id="grad0" cx="55%" cy="30%" r="75%"><stop offset="0%" stop-color="#FCA5A5"/><stop offset="100%" stop-color="#DC2626"/></radialGradient>
            <radialGradient id="grad1" cx="55%" cy="30%" r="75%"><stop offset="0%" stop-color="#86EFAC"/><stop offset="100%" stop-color="#15803D"/></radialGradient>
            <radialGradient id="grad2" cx="55%" cy="30%" r="75%"><stop offset="0%" stop-color="#FDE68A"/><stop offset="100%" stop-color="#B45309"/></radialGradient>
            <radialGradient id="grad3" cx="55%" cy="30%" r="75%"><stop offset="0%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#6D28D9"/></radialGradient>
            <filter id="segGlow0" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="segGlow1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="segGlow2" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="segGlow3" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="dotGlow" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <g id="cycleSegments"></g>
          <circle cx="180" cy="180" r="80" fill="white" stroke="#E2E8F0" stroke-width="1"/>
          <circle cx="180" cy="180" r="73" fill="#F8FAFC" opacity="0.9"/>
          <text id="cycleCenter1" x="180" y="175" text-anchor="middle" dominant-baseline="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1A2340">…</text>
          <text id="cycleCenter2" x="180" y="193" text-anchor="middle" dominant-baseline="middle" font-family="Inter, sans-serif" font-size="10" fill="#6B7280">28 dagen</text>
          <g id="cycleIndicator" style="pointer-events:none;">
            <circle r="12" fill="none" stroke="#3B6BF7" stroke-width="2" opacity="0.25"/>
            <circle r="8" fill="#3B6BF7" filter="url(#dotGlow)"/>
            <circle r="4" fill="white" opacity="0.9"/>
            <circle r="2" fill="#3B6BF7"/>
          </g>
        </svg>
      </div>
      <div class="cycle-info" id="cycleInfo"></div>
    </div>
    <p class="cycle-disclaimer">Cycli verschillen per persoon. In Structuro stuur jij zelf: geen algoritme.</p>
  </section>
</div>
<script src="/js/landing-cycle.js"></script>
</body>
</html>
